<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Francesco Vaiani | Product Manager</title>
    <meta
      name="description"
      content="Bilingual personal site and CV for Francesco Vaiani, Product Manager with full-stack background in SaaS, IoT, and device management."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Sora:wght@500;600;700&family=Source+Sans+3:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js" defer></script>
    <link rel="stylesheet" href="./design-system/css/tokens.css" />
    <link rel="stylesheet" href="./design-system/css/base.css" />
    <link rel="stylesheet" href="./styles/site.css" />
  </head>
  <body>
    <section id="hero" class="hero-impact is-visible" data-reveal>
      <div class="hero-inner">
        <div class="hero-copy">
          <p class="eyebrow" id="hero-eyebrow"></p>
          <h1 id="hero-title"></h1>
          <p id="hero-summary"></p>
          <div class="hero-kpis" id="hero-kpis"></div>
          <div class="cta-row chrome-only">
            <a class="btn btn-primary" id="cta-contact" href="#contact"></a>
            <a
              class="btn btn-ghost"
              id="cta-linkedin"
              href="https://www.linkedin.com/in/francesco-vaiani-81266aa7/"
              target="_blank"
              rel="noreferrer noopener"
            ></a>
            <a class="btn btn-ghost" id="cta-print" data-action="print" href="#hero"></a>
          </div>
        </div>
        <div class="hero-visual">
          <div class="hero-geometry" aria-hidden="true">
            <div class="hero-accent-bar"></div>
          </div>
          <img
            class="hero-portrait"
            src="./assets/propic_scontornata.png"
            alt="Francesco Vaiani portrait"
          />
        </div>
      </div>
    </section>

    <section id="tools-strip" class="tools-strip" data-reveal aria-label="Software logos carousel">
      <div class="container">
        <p class="eyebrow tools-strip-eyebrow" id="tools-strip-eyebrow"></p>
        <h2 class="tools-strip-title" id="tools-strip-title"></h2>
        <div class="tools-marquee" role="region" aria-live="polite">
          <div class="tools-track" id="tools-track"></div>
        </div>
      </div>
    </section>

    <div class="container">
      <div class="shell">
        <aside class="rail chrome-only">
          <h1 id="rail-title"></h1>
          <p id="rail-subtitle"></p>

          <nav class="nav-list" id="nav-list" aria-label="Section navigation"></nav>

          <div class="lang-switch" id="language-switch" aria-label="Language switch">
            <button type="button" data-lang="en">EN</button>
            <button type="button" data-lang="it">IT</button>
          </div>

          <div class="theme-switch" id="theme-switch" aria-label="Theme switch">
            <button class="theme-btn" id="theme-light" type="button" data-theme-set="light">
              Light
            </button>
            <button class="theme-btn" id="theme-dark" type="button" data-theme-set="dark">
              Dark
            </button>
            <button class="theme-btn" id="theme-auto" type="button" data-theme-set="auto">
              Auto
            </button>
          </div>
        </aside>

        <main class="content" id="content-root">
          <section id="print-intro" class="panel print-only" aria-hidden="true"></section>

          <section id="profile" class="panel" data-reveal></section>

          <section id="product-work" class="panel" data-reveal></section>

          <section id="skills" class="panel" data-reveal></section>

          <section id="experience" class="panel" data-reveal></section>

          <section id="approach" class="panel" data-reveal></section>

          <section id="education" class="panel" data-reveal></section>

          <section id="media" class="panel" data-reveal hidden aria-hidden="true"></section>

          <section id="languages" class="panel" data-reveal></section>

          <section id="contact" class="panel" data-reveal></section>

          <section id="tools-print" class="panel print-only" aria-hidden="true"></section>
        </main>
      </div>
    </div>

    <script type="module" src="./scripts/app.js"></script>
  </body>
</html>
