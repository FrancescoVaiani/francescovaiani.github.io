<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">FV monogram favicon</title>
  <desc id="desc">Dark navy square with cyan ring and FV monogram.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071631" />
      <stop offset="100%" stop-color="#0f2a52" />
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#37b7ff" />
      <stop offset="100%" stop-color="#9edcff" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)" />
  <circle cx="256" cy="256" r="150" fill="none" stroke="url(#ring)" stroke-width="22" opacity="0.92" />
  <text
    x="256"
    y="286"
    text-anchor="middle"
    font-family="Sora, Segoe UI, Arial, sans-serif"
    font-size="168"
    font-weight="700"
    letter-spacing="-6"
    fill="#f4fbff"
  >
    FV
  </text>
</svg>
